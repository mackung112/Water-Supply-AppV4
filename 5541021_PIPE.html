<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>MapLibre OSM + Pipe</title>

  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html,
    body,
    #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <script>
    var myST = {

      version: 8,
      name: "MyStyle",

      sprite: "https://gisdb.pwa.co.th/core/api/tiles/1.0-beta/sprite/65792edcd715b5ab12310280/sprites",

      glyphs: "https://gisdb.pwa.co.th/core/tiles/fonts/{fontstack}/{range}.pbf",

      sources: {
        carto: {
          type: "raster",
          tiles: [
            "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
          ],
          tileSize: 256
        }
      },

      layers: [
        {
          id: "carto-base",
          type: "raster",
          source: "carto"
        }
      ]

    };

    /* ================= BASE STYLE (OSM) ================= */

    const styleBase = myST;

    /* ================= API ================= */

    const API_KEY = "uVo4Txm5cyqWTfNOBKGTGx2PRc7uzVYhE07hdE0MrN2BgkPbjxmUKWD70ZHVjG5k";

    const STYLE_URL =
      "https://gisapi-gateway.pwa.co.th/api/2.0/resources/styles/pwa-styles/styles-std?api_key=" + API_KEY;

    const TILE_PIPE =
      "https://gisapi-gateway.pwa.co.th/api/2.0/resources/tiles/pwa-tiles/pwa-tile-pipe-b5541021?api_key=" + API_KEY;

    const SRC_PIPE = "665c60f8dd708e21f678ae25";

    /* ================= MAP ================= */

    const map = new maplibregl.Map({
      container: "map",
      style: styleBase,
      center: [100.55, 14.35], // อยุธยา
      zoom: 11
    });

    map.addControl(new maplibregl.NavigationControl());

    /* ================= LOAD ================= */

    map.on("load", async () => {

      // โหลด style JSON เดิม
      const res = await fetch(STYLE_URL);
      const styleJSON = await res.json();

      // เพิ่ม source pipe
      map.addSource("pipe", {
        type: "vector",
        url: TILE_PIPE
      });

      // filter เอาเฉพาะ layer ที่เป็น pipe
      const pipeLayers = styleJSON.layers.filter(l =>
        l.id.toLowerCase().includes("pipe")
      );

      // add layer เข้า map
      pipeLayers.forEach(layer => {

        const newLayer = {
          ...layer,
          id: "pipe-" + layer.id,
          source: "pipe",
          "source-layer": SRC_PIPE
        };

        map.addLayer(newLayer);

      });

    });

  </script>

</body>

</html>
